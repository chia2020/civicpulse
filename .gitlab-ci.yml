stages:
  - compliance
  - pre-commit
  - quality
  - security
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  paths:
    - .cache/pip
    - .cache/pre-commit

default:
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade "pip>=26.1.2"
    - pip install -r requirements-dev.txt

project-compliance:
  stage: compliance
  script:
    - test -f AGENTS.md
    - test -f requirements.txt
    - test -f requirements-dev.txt
    - test -f pytest.ini
    - test -f .pre-commit-config.yaml

pre-commit:
  stage: pre-commit
  before_script:
    - apt-get update && apt-get install -y git
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - python -m pip install --upgrade "pip>=26.1.2"
    - pip install -r requirements-dev.txt
  script:
    - pre-commit run --all-files --show-diff-on-failure

quality:
  stage: quality
  script:
    - ruff check .
    - ruff format --check .
    - mypy src
    - flake8 .
    - pylint src
    - vulture src app.py

security:
  stage: security
  script:
    - bandit -r src
    - pip-audit --ignore-vuln PYSEC-2026-87
    - semgrep --config auto --error

test:
  stage: test
  script:
    - pytest tests/
