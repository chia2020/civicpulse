stages:
  - compliance
  - pre-commit
  - quality
  - security
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  paths:
    - .cache/pip
    - .cache/pre-commit

default:
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade "pip>=26.1.2"
    - pip install -r requirements-dev.txt

run-organization-compliance:
  stage: compliance
  # Pulls the hosted checker environment automatically
  image: meowear/swecha_compliance_checker:latest
  
  # Bypasses any global/default pip compilation hooks
  before_script: []
  variables:
    REPO_URL: "$CI_REPOSITORY_URL"
    BRANCH: "$CI_COMMIT_BRANCH"
    GITLAB_URL: "$CI_SERVER_URL"
    OUTPUT_DIR: "$CI_PROJECT_DIR/reports"
    
  script:
    - mkdir -p "$CI_PROJECT_DIR/reports"
    - echo "Executing containerized compliance check..."
    - export GITLAB_TOKEN="$ORGANIZATION_COMPLIANCE_TOKEN"
    - bash /app/entrypoint-checker.sh
    
  artifacts:
    name: "compliance-report-${CI_PROJECT_NAME}"
    when: always
    paths:
      - reports/ # Collects the generated JSON file as a pipeline download

quality:
  stage: quality
  script:
    - ruff check .
    - ruff format --check .
    - mypy src
    - flake8 .
    - pylint src
    - vulture src app.py

security:
  stage: security
  before_script:
    - python -m pip install --upgrade "pip>=26.1.2"
    - pip install bandit pip-audit semgrep
  script:
    - bandit -r src
    - pip-audit --ignore-vuln PYSEC-2026-87 -r requirements.txt -r requirements-dev.txt
    - semgrep --config auto --error src/ app.py

test:
  stage: test
  script:
    - pytest tests/
